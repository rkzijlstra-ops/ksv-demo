name: CI

# Draait de volledige testsuite in de cloud bij elke push naar master en bij pull requests:
# typecheck + unit + integratie + browser-e2e. De build wordt apart gevalideerd (stap "App bouwen"),
# maar de e2e zelf draait tegen `next dev` (zie playwright.config.ts): de productie-build gaf in CI
# valse "data verschijnt niet"-fouten die op Vercel niet optreden, terwijl next dev lokaal-groen matcht.
# De geheime testomgeving komt uit de repo-secret ENV_TEST (de inhoud van .env.test).

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Code ophalen
        uses: actions/checkout@v5

      - name: Node opzetten
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Dependencies installeren
        run: npm ci

      - name: Testomgeving (.env) aanmaken uit secret
        # De server-env-validator (src/lib/env.ts) eist SUPABASE_PUBLISHABLE_KEY (zonder NEXT_PUBLIC) en
        # ANTHROPIC/OPENAI-keys. In .env.test staat alleen de NEXT_PUBLIC-publishable; lokaal vullen de
        # AI-keys uit .env.local de rest aan. In de cloud forceren we ze: de publishable uit de
        # NEXT_PUBLIC-variant, en geldige dummy AI-keys (de e2e roept Claude/OpenAI niet aan).
        # .env.test = voor de Playwright-config/global-setup; .env.local = voor next build/next start.
        run: |
          printf '%s\n' "$ENV_TEST" > .env.full
          PUBKEY=$(grep -E '^NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=' .env.full | head -1 | cut -d= -f2-)
          grep -vE '^(SUPABASE_PUBLISHABLE_KEY|ANTHROPIC_API_KEY|OPENAI_API_KEY)=' .env.full > .env.test
          {
            echo "SUPABASE_PUBLISHABLE_KEY=$PUBKEY"
            echo "ANTHROPIC_API_KEY=ci-e2e-dummy-anthropic-key-0000000000"
            echo "OPENAI_API_KEY=ci-e2e-dummy-openai-key-0000000000"
          } >> .env.test
          cp .env.test .env.local
          rm -f .env.full
        env:
          ENV_TEST: ${{ secrets.ENV_TEST }}

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit-tests
        run: npm test

      - name: Integratietests
        run: npm run test:int

      - name: App bouwen (productie)
        run: npm run build

      - name: Playwright-browser installeren
        run: npx playwright install --with-deps chromium

      - name: Browser-e2e (tegen de productie-build)
        run: npm run test:e2e

      - name: Demo-e2e (uitstalraam, eigen DEMO_MODE-server + eigen demo-zaak)
        run: npm run test:e2e:demo

      - name: Test-resultaten bewaren bij een fout (trace + snapshots)
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: e2e-resultaten
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore
