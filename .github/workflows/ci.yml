name: CI

# Draait de volledige testsuite in de cloud bij elke push naar master en bij pull requests:
# typecheck + unit + integratie + browser-e2e. De e2e draait tegen een kant-en-klare productie-build
# (next build + next start), niet tegen een dev-server, dus snel en zonder hangen.
# De geheime testomgeving komt uit de repo-secret ENV_TEST (de inhoud van .env.test).

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Node opzetten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Dependencies installeren
        run: npm ci

      - name: Testomgeving aanmaken uit secret
        # .env.test voor de Playwright-config/global-setup; .env.local zodat `next build`/`next start`
        # met dezelfde test-Supabase draaien (NEXT_PUBLIC-waarden worden in de build gebakken).
        run: |
          printf '%s\n' "$ENV_TEST" > .env.test
          cp .env.test .env.local
        env:
          ENV_TEST: ${{ secrets.ENV_TEST }}

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit-tests
        run: npm test

      - name: Integratietests
        run: npm run test:int

      - name: App bouwen (productie)
        run: npm run build

      - name: Playwright-browser installeren
        run: npx playwright install --with-deps chromium

      - name: Browser-e2e (tegen de productie-build)
        run: npm run test:e2e
