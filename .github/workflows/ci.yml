name: CI

# Draait de snelle, betrouwbare checks in de cloud bij elke push naar master en bij pull requests:
# typecheck + unit-tests + integratietests. De geheime testomgeving komt uit de repo-secret ENV_TEST
# (de inhoud van .env.test).
#
# De zware browser-e2e draait hier (nog) NIET: met een dev-server in de cloud hangt die (net als lokaal
# op Windows). Die wordt voorlopig handmatig in PowerShell gedraaid. Cloud-e2e volgt later, op de
# snellere manier (de app één keer kant-en-klaar bouwen en daartegen testen).

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Node opzetten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Dependencies installeren
        run: npm ci

      - name: Testomgeving (.env.test) aanmaken uit secret
        run: printf '%s\n' "$ENV_TEST" > .env.test
        env:
          ENV_TEST: ${{ secrets.ENV_TEST }}

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit-tests
        run: npm test

      - name: Integratietests
        run: npm run test:int
